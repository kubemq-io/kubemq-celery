# Docker Compose: multi-worker KubeMQ Celery setup
#
# Starts a KubeMQ broker, 2 Celery workers (different queues),
# and a Beat scheduler for local development.
#
# Usage:
#   docker compose up -d                   # start all services
#   docker compose logs -f worker-default  # watch default worker
#   docker compose logs -f worker-priority # watch priority worker
#   docker compose down                    # stop all services
#
# KubeMQ Dashboard: http://localhost:9090
# Flower (if enabled): http://localhost:5555

services:
  # KubeMQ broker
  kubemq:
    image: kubemq/kubemq:latest
    ports:
      - "50000:50000"  # gRPC
      - "9090:9090"    # Dashboard
    environment:
      - KUBEMQ_LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Worker 1: default queue
  worker-default:
    build:
      context: ../..
      dockerfile: examples/kubernetes/Dockerfile
    command: celery -A basic_task worker --loglevel=info -Q celery --concurrency=2
    environment:
      - CELERY_BROKER_URL=kubemq://kubemq:50000
      - CELERY_RESULT_BACKEND=kubemq://kubemq:50000
    depends_on:
      kubemq:
        condition: service_healthy
    restart: unless-stopped

  # Worker 2: high-priority queue
  worker-priority:
    build:
      context: ../..
      dockerfile: examples/kubernetes/Dockerfile
    command: celery -A basic_task worker --loglevel=info -Q high-priority --concurrency=2
    environment:
      - CELERY_BROKER_URL=kubemq://kubemq:50000
      - CELERY_RESULT_BACKEND=kubemq://kubemq:50000
    depends_on:
      kubemq:
        condition: service_healthy
    restart: unless-stopped

  # Beat scheduler
  beat:
    build:
      context: ../..
      dockerfile: examples/kubernetes/Dockerfile
    command: celery -A basic_task beat --loglevel=info
    environment:
      - CELERY_BROKER_URL=kubemq://kubemq:50000
      - CELERY_RESULT_BACKEND=kubemq://kubemq:50000
    depends_on:
      kubemq:
        condition: service_healthy
    restart: unless-stopped

